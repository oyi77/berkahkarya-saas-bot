# =============================================================================
# PAYMENT GATEWAY CONFIGURATION
# =============================================================================

# =============================================================================
# GATEWAY SETTINGS
# =============================================================================
gateways:
  # Primary Gateway: Midtrans
  midtrans:
    enabled: true
    environment: "${MIDTRANS_ENVIRONMENT}"
    server_key: "${MIDTRANS_SERVER_KEY}"
    client_key: "${MIDTRANS_CLIENT_KEY}"
    merchant_id: "${MIDTRANS_MERCHANT_ID}"
    snap_mode: true
    
    # Payment channels
    channels:
      - qris
      - bank_transfer
      - echannel
      - gopay
      - shopeepay
      - credit_card
    
    # Retry configuration
    retry:
      max_attempts: 3
      backoff: "exponential"
      initial_delay: 2000
      max_delay: 30000
    
    # Circuit breaker
    circuit_breaker:
      failure_threshold: 10
      recovery_timeout: 60000
      half_open_max_calls: 5
    
    # Webhook
    webhook:
      endpoint: "/webhooks/midtrans"
      secret: "${MIDTRANS_WEBHOOK_SECRET}"
      verify_signature: true
      idempotency_key: true
  
  # Backup Gateway: Tripay
  tripay:
    enabled: true
    environment: "${TRIPAY_ENVIRONMENT}"
    api_key: "${TRIPAY_API_KEY}"
    private_key: "${TRIPAY_PRIVATE_KEY}"
    merchant_code: "${TRIPAY_MERCHANT_CODE}"
    
    # Payment channels
    channels:
      - qris
      - va
      - retail
      - ewallet
    
    # Activation condition
    activation:
      condition: "primary_failure_rate > 10%"
      auto_failback: true
      failback_delay: 300000  # 5 minutes
    
    # Webhook
    webhook:
      endpoint: "/webhooks/tripay"
      verify_signature: true

# =============================================================================
# PAYMENT SETTINGS
# =============================================================================
settings:
  # Transaction timeout
  timeout_minutes: 30
  
  # Expiry settings
  expiry:
    pending: 1800  # 30 minutes
    processing: 300  # 5 minutes
  
  # Retry settings
  retry:
    max_attempts: 3
    backoff_strategy: "exponential"
    initial_delay: 2000
    max_delay: 30000
  
  # Fraud detection
  fraud_detection:
    enabled: true
    velocity_check: true
    max_transactions_per_hour: 5
    max_amount_per_day: 5000000  # 5 million IDR
    manual_review_threshold: 1000000  # 1 million IDR
  
  # Notification settings
  notifications:
    pending_reminder: [900, 1800]  # 15 min, 30 min
    success: true
    failure: true
    expiry: true

