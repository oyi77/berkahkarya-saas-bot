# =============================================================================
# FEATURE FLAGS CONFIGURATION
# =============================================================================
# 
# This file contains all feature flags for the OpenClaw Bot.
# Features can be enabled/disabled globally or per tier/region.
#
# Usage:
# - Set 'enabled: true/false' for global toggle
## - Use 'tiers' to restrict by user tier
# - Use 'regions' to restrict by geography
# - Use 'percentage' for gradual rollout
#
# =============================================================================

# =============================================================================
# CORE FEATURES
# =============================================================================

# Video Generation
core_video_generation:
  enabled: true
  description: "Core video generation functionality"
  tiers: ["free", "basic", "pro", "agency"]
  regions: ["all"]

# Image Upload
core_image_upload:
  enabled: true
  description: "Upload images for video generation"
  tiers: ["free", "basic", "pro", "agency"]
  regions: ["all"]
  limits:
    free:
      max_files: 3
      max_size_mb: 5
    basic:
      max_files: 5
      max_size_mb: 10
    pro:
      max_files: 10
      max_size_mb: 20
    agency:
      max_files: 20
      max_size_mb: 50

