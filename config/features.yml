# =============================================================================
# FEATURE FLAG MANAGEMENT
# =============================================================================

# How to add new features:
# 1. Add entry below with unique key
# 2. Set enabled: false initially
# 3. Use rollout_percentage for gradual rollout
# 4. Update tiers/regions as needed
# 5. Set enabled: true when ready for full release

# Rollout strategy:
# - Start with rollout_percentage: 5
# - Monitor for 24-48 hours
# - Increase gradually: 10, 25, 50, 100
# - Once stable, set enabled: true

# Emergency disable:
# - Set enabled: false to immediately disable
# - All users affected immediately
