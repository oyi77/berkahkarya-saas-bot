    free: ["tiktok", "instagram"]
    basic: ["tiktok", "instagram", "youtube", "facebook"]
    pro: ["tiktok", "instagram", "youtube", "facebook", "twitter"]
    agency: ["tiktok", "instagram", "youtube", "facebook", "twitter", "linkedin"]

